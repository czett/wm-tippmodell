<!doctype html>
<html lang="de" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WM 2026 Tracker & Prognosen</title>

        <!-- Google Fonts: Space Grotesk -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['"Space Grotesk"', "sans-serif"],
                        },
                        colors: {
                            zinc: {
                                950: "#000000" /* pure black */,
                                900: "#09090b" /* premium dark grey */,
                                800: "#1f1f23" /* thin borders */,
                                700: "#27272a",
                                400: "#a1a1aa" /* muted text */,
                                50: "#ffffff" /* pure white */,
                            },
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #000000;
                color: #ffffff;
                font-family: "Space Grotesk", sans-serif;
            }
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: #000000;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #1f1f23;
                border-radius: 10px;
            }

            /* Tactical Slider styling - Monochrome */
            input[type="range"] {
                -webkit-appearance: none;
                background: transparent;
            }
            input[type="range"]::-webkit-slider-runnable-track {
                width: 100%;
                height: 4px;
                background: #1f1f23;
                border-radius: 2px;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                height: 14px;
                width: 14px;
                border-radius: 50%;
                background: #ffffff;
                cursor: pointer;
                margin-top: -5px;
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            }

            /* Remove arrows from number inputs */
            input::-webkit-outer-spin-button,
            input::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }
        </style>
    </head>
    <body class="bg-[#000000] text-zinc-50 antialiased">
        <!-- Header -->
        <header
            class="sticky top-0 z-40 w-full border-b border-[#1f1f23] bg-black/90 backdrop-blur-md"
        >
            <div
                class="container mx-auto flex h-16 items-center justify-between px-4"
            >
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-bold tracking-tighter text-white"
                        >Sloptip Yogurt</span
                    >
                </div>
                <div class="flex items-center gap-3">
                    <button
                        id="calculatePredictions"
                        class="inline-flex items-center justify-center rounded-md bg-white px-4 py-2 text-sm font-medium text-black hover:bg-zinc-200 transition-all"
                    >
                        Tipps berechnen
                    </button>
                    <button
                        id="saveEverything"
                        class="inline-flex items-center justify-center rounded-md border border-zinc-800 bg-transparent px-4 py-2 text-sm font-medium text-zinc-300 hover:bg-zinc-900 transition-all"
                    >
                        Alles speichern
                    </button>
                </div>
            </div>
        </header>

        <div class="container mx-auto mt-10 px-4 pb-24">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <!-- Linke Spalte: Administration & Teams -->
                <aside class="lg:col-span-4 space-y-8">
                    <!-- Card: Team hinzufügen -->
                    <section
                        class="rounded-xl border border-[#1f1f23] bg-[#09090b] p-6 shadow-sm"
                    >
                        <h2
                            class="text-xl font-bold mb-5 tracking-tight text-white"
                        >
                            Team hinzufügen
                        </h2>
                        <form id="addTeamForm" class="space-y-5">
                            <div class="space-y-2">
                                <label
                                    class="text-xs font-bold uppercase tracking-widest text-zinc-400"
                                    >Team-Name</label
                                >
                                <input
                                    type="text"
                                    id="teamName"
                                    required
                                    placeholder="z.B. Deutschland"
                                    class="flex h-11 w-full rounded-md border border-zinc-800 bg-black px-4 py-2 text-sm font-medium text-white focus:outline-none focus:ring-1 focus:ring-white transition-all placeholder:text-zinc-700"
                                />
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="text-xs font-bold uppercase tracking-widest text-zinc-400"
                                    >Initiales Rating (0-100)</label
                                >
                                <input
                                    type="number"
                                    id="teamRating"
                                    min="0"
                                    max="100"
                                    value="50"
                                    required
                                    class="flex h-11 w-full rounded-md border border-zinc-800 bg-black px-4 py-2 text-sm font-medium text-white focus:outline-none focus:ring-1 focus:ring-white transition-all"
                                />
                            </div>
                            <button
                                type="submit"
                                class="w-full rounded-md bg-white py-2.5 text-sm font-medium text-black hover:bg-zinc-200 transition-colors"
                            >
                                Hinzufügen
                            </button>
                        </form>
                    </section>

                    <!-- Card: Spiel hinzufügen -->
                    <section
                        class="rounded-xl border border-[#1f1f23] bg-[#09090b] p-6 shadow-sm"
                    >
                        <h2
                            class="text-xl font-bold mb-5 tracking-tight text-white"
                        >
                            Spiel hinzufügen
                        </h2>
                        <form id="addMatchForm" class="space-y-5">
                            <div class="space-y-2">
                                <label
                                    class="text-xs font-bold uppercase tracking-widest text-zinc-400"
                                    >Team 1</label
                                >
                                <select
                                    id="homeTeamSelect"
                                    required
                                    class="flex h-11 w-full rounded-md border border-zinc-800 bg-black px-4 py-2 text-sm font-medium text-white focus:outline-none focus:ring-1 focus:ring-white transition-all"
                                ></select>
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="text-xs font-bold uppercase tracking-widest text-zinc-400"
                                    >Team 2</label
                                >
                                <select
                                    id="awayTeamSelect"
                                    required
                                    class="flex h-11 w-full rounded-md border border-zinc-800 bg-black px-4 py-2 text-sm font-medium text-white focus:outline-none focus:ring-1 focus:ring-white transition-all"
                                ></select>
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="text-xs font-bold uppercase tracking-widest text-zinc-400"
                                    >Spieltag / Phase</label
                                >
                                <input
                                    type="text"
                                    id="matchdayInput"
                                    placeholder="z.B. Gruppe A, Achtelfinale"
                                    required
                                    class="flex h-11 w-full rounded-md border border-zinc-800 bg-black px-4 py-2 text-sm font-medium text-white focus:outline-none focus:ring-1 focus:ring-white transition-all placeholder:text-zinc-700"
                                />
                            </div>
                            <button
                                type="submit"
                                class="w-full rounded-md bg-white py-2.5 text-sm font-medium text-black hover:bg-zinc-200 transition-colors"
                            >
                                Spiel anlegen
                            </button>
                        </form>
                    </section>

                    <!-- Card: Teams Liste -->
                    <section
                        class="rounded-xl border border-[#1f1f23] bg-[#09090b] p-6 shadow-sm"
                    >
                        <div class="flex items-center justify-between mb-6">
                            <h2
                                class="text-xl font-bold tracking-tight text-white"
                            >
                                Teams
                            </h2>
                            <button
                                id="saveRatings"
                                class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition-colors"
                            >
                                Ratings speichern
                            </button>
                        </div>
                        <div
                            id="teamsList"
                            class="space-y-4 max-h-[450px] overflow-y-auto custom-scrollbar pr-2"
                        >
                            <!-- Teams injection -->
                        </div>
                    </section>
                </aside>

                <!-- Hauptbereich: Spiele -->
                <main class="lg:col-span-8">
                    <div id="matchesContainer" class="space-y-10">
                        <!-- Matches injection -->
                    </div>
                </main>
            </div>
        </div>

        <!-- Notification Toast -->
        <div
            id="toast"
            class="fixed bottom-8 right-8 flex items-center gap-4 rounded-xl border border-[#1f1f23] bg-[#09090b] px-6 py-4 text-sm font-medium text-zinc-50 shadow-2xl transition-all duration-500 transform translate-y-32 opacity-0 z-50"
        >
            <div
                id="toastIcon"
                class="h-2 w-2 rounded-full bg-white animate-pulse"
            ></div>
            <span id="toastMessage"></span>
        </div>

        <script src="/static/js/app.js"></script>
    </body>
</html>
